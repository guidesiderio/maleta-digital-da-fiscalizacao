<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maleta Digital da Fiscalização — UFPI</title>
    <meta
      name="description"
      content="Acervo digital de documentos oficiais do Departamento de Fiscalização de Contratos da UFPI. Manuais, portarias, legislação e modelos para fiscais de contratos."
    />

    <!-- Open Graph / WhatsApp / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Maleta Digital da Fiscalização — UFPI" />
    <meta
      property="og:description"
      content="Acervo digital de documentos oficiais do Departamento de Fiscalização de Contratos da UFPI. Manuais, portarias, legislação e modelos para fiscais."
    />
    <meta property="og:image" content="assets/img/logo-ufpi.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Maleta Digital da Fiscalização — UFPI" />
    <meta
      name="twitter:description"
      content="Acervo digital de documentos oficiais do Departamento de Fiscalização de Contratos da UFPI."
    />

    <meta name="theme-color" content="#210e0b" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png" />

    <!-- Google Fonts — carregamento assíncrono (#14) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Work+Sans:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Work+Sans:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap"
      />
    </noscript>

    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <a href="#base" class="skip-link">Ir para o conteúdo</a>
    <div aria-live="polite" id="a11yAnnouncer" class="sr-only"></div>
    <header class="inst-header">
      <img
        id="logo-institucional"
        src="assets/img/logo-ufpi.png"
        alt="Logo institucional da Universidade Federal do Piauí"
        class="inst-logo"
      />
      <div class="inst-info">
        <div class="inst-organ">Universidade Federal do Piauí — UFPI</div>
        <div class="inst-sector">Departamento de Fiscalização de Contratos</div>
      </div>
    </header>

    <div class="wrap" role="main">
      <div class="scene">
        <div class="case-wrap">
          <div class="handle-outer"><div class="handle"></div></div>

          <div class="lid" id="lid">
            <h1 class="lid-title">Maleta Digital da Fiscalização</h1>
            <div class="lid-acervo">
              Acervo digital de documentos oficiais do Departamento de Fiscalização
            </div>
            <div class="lid-latch" id="latch"></div>
            <div class="lid-hinges">
              <div class="hinge"></div>
              <div class="hinge"></div>
            </div>
          </div>

          <div class="base" id="base">
            <div class="folders-row" id="foldersRow"></div>
            <div class="modal-overlay" id="modalOv">
              <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="mTitle">
                <button class="modal-close-btn" id="mClose" aria-label="Fechar">✕</button>
                <div class="modal-header">
                  <div class="modal-num" id="mNum"></div>
                  <h2 class="modal-title-text" id="mTitle"></h2>
                </div>
                <hr class="modal-sep" />
                <div id="mContent"></div>
              </div>
            </div>
          </div>
        </div>

        <button class="open-btn" id="openBtn">&#9654; Abrir maleta</button>
      </div>
    </div>

    <footer class="page-footer" id="pageFooter"></footer>

    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js").catch(() => {});
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (typeof showToast === "function") showToast("Nova versão disponível!");
        });
      }
    </script>
  </body>
</html>
