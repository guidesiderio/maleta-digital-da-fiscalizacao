<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maleta Digital</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="inst-header">
      <img
        id="logo-institucional"
        src="assets/159ad273727527.Y3JvcCwxNjI3LDEyNzIsMCww.png"
        alt="Logo institucional da Universidade Federal do Piauí"
        class="inst-logo"
      />
      <div class="inst-info">
        <div class="inst-organ">Universidade Federal do Piauí — UFPI</div>
        <div class="inst-sector">Departamento de Fiscalização de Contratos</div>
      </div>
    </header>

    <div class="wrap">
      <div class="scene">
        <div class="case-wrap">
          <div class="handle-outer"><div class="handle"></div></div>

          <div class="lid" id="lid">
            <h1 class="lid-title">Maleta Digital da Fiscalização</h1>
            <div class="lid-acervo">
              Acervo digital de documentos oficiais do Departamento de Fiscalização
            </div>
            <div class="lid-latch" id="latch"></div>
            <div class="lid-hinges">
              <div class="hinge"></div>
              <div class="hinge"></div>
            </div>
          </div>

          <div class="base" id="base">
            <div class="folders-row" id="foldersRow"></div>
            <div class="modal-overlay" id="modalOv">
              <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="mTitle">
                <button class="modal-close-btn" id="mClose" aria-label="Fechar">✕</button>
                <div class="modal-num" id="mNum"></div>
                <h2 class="modal-title-text" id="mTitle"></h2>
                <hr class="modal-sep" />
                <div id="mContent"></div>
              </div>
            </div>
          </div>
        </div>

        <button class="open-btn" id="openBtn">&#9654; Abrir maleta</button>
      </div>
    </div>

    <footer class="page-footer" id="pageFooter"></footer>

    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
